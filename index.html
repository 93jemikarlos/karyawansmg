<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Riwayat Karyawan </title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); 
        }
        .luxury-card { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.03), 0 4px 12px -2px rgba(0, 0, 0, 0.02);
        }
        .luxury-shadow {
            box-shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.05);
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-10 text-center md:text-left flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-3xl md:text-4xl font-black tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-slate-900 via-indigo-950 to-blue-900">
                    <i class="fa-solid fa-id-card-clip mr-2 text-blue-600"></i>HR Portal Cek
                </h1>
                <p class="text-sm text-slate-500 mt-1 font-medium tracking-wide">Manajemen & Pencarian Riwayat Karyawan KSP CU Semarong</p>
            </div>
            <div id="connection-status" class="text-xs font-semibold px-4 py-2 rounded-full bg-amber-50 text-amber-600 border border-amber-200 shadow-sm flex items-center gap-2 transition-all duration-500">
                <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span> Connecting to Firebase...
            </div>
        </header>

        <div class="luxury-card rounded-2xl p-5 mb-8 luxury-shadow">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="relative flex-1">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-base"></i>
                    <input 
                        type="text" 
                        id="search-input"
                        placeholder="Cari berdasarkan Nama, NIK, Jabatan, atau Departemen..." 
                        class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3.5 pl-12 pr-4 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white transition-all shadow-inner"
                    >
                </div>
                <button onclick="clearSearch()" id="btn-reset" class="hidden bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold px-6 py-3.5 rounded-xl transition-all items-center justify-center border border-slate-200">
                    Reset
                </button>
            </div>
        </div>

        <div class="luxury-card rounded-2xl overflow-hidden luxury-shadow">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50/70 border-b border-slate-100 text-slate-500 text-xs font-bold uppercase tracking-wider">
                            <th class="py-4 px-6">Karyawan</th>
                            <th class="py-4 px-6">NIK</th>
                            <th class="py-4 px-6">Posisi & Dep</th>
                            <th class="py-4 px-6">Tanggal Masuk</th>
                            <th class="py-4 px-6">Status</th>
                        </tr>
                    </thead>
                    <tbody id="employee-table-body" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
            
            <div class="bg-slate-50/50 px-6 py-4 border-t border-slate-100 text-xs font-medium text-slate-500 flex justify-between items-center">
                <div id="total-employees">Menghitung karyawan...</div>
                <div class="tracking-wider uppercase text-[10px] text-slate-400 font-bold">Sistem HR v2.1</div>
            </div>
        </div>
    </div>

    <script>
        const firebaseURL = "https://karyawan-3a1e8-default-rtdb.firebaseio.com/riwayat_karyawan.json"; 

        let allEmployees = [];

        async function fetchEmployees() {
            try {
                const response = await fetch(firebaseURL);
                const data = await response.json();
                
                if(data) {
                    allEmployees = Object.keys(data).map(key => ({
                        id: key,
                        ...data[key]
                    }));
                    
                    const statusDiv = document.getElementById('connection-status');
                    statusDiv.className = "text-xs font-semibold px-4 py-2 rounded-full bg-emerald-50 text-emerald-600 border border-emerald-200 shadow-sm flex items-center gap-2";
                    statusDiv.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Firebase Live Connected`;
                    
                    renderTable(allEmployees);
                } else {
                    document.getElementById('employee-table-body').innerHTML = `
                        <tr><td colspan="5" class="py-16 text-center text-slate-400 font-medium">Database Firebase terhubung, tetapi tidak ada data ditemukan.</td></tr>
                    `;
                    document.getElementById('total-employees').innerHTML = `Menampilkan <b>0</b> karyawan`;
                }
            } catch (error) {
                console.error("Gagal memuat data:", error);
                document.getElementById('employee-table-body').innerHTML = `
                    <tr><td colspan="5" class="py-16 text-center text-red-500 font-medium">Gagal terhubung ke Firebase. Periksa URL atau aturan database (.read: true)</td></tr>
                `;
            }
        }

        function renderTable(data) {
            const tableBody = document.getElementById('employee-table-body');
            const totalDiv = document.getElementById('total-employees');
            tableBody.innerHTML = '';

            if(data.length === 0) {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="5" class="py-16 text-center">
                            <div class="text-slate-300 mb-3"><i class="fa-regular fa-folder-open text-5xl"></i></div>
                            <p class="text-slate-400 font-medium">Tidak ada data riwayat karyawan ditemukan</p>
                        </td>
                    </tr>`;
                totalDiv.innerHTML = `Menampilkan <b>0</b> karyawan`;
                return;
            }

            data.forEach(emp => {
                const nama = emp.nama || "Tanpa Nama";
                const nik = emp.nik || "-";
                const jabatan = emp.jabatan || "-";
                const departemen = emp.departemen || "-";
                const status = emp.status || "Kontrak";
                const tanggal = emp.tanggal_masuk ? new Date(emp.tanggal_masuk) : new Date();

                // Tema badge putih mewah (Soft translucent style)
                const badgeClass = status.toLowerCase() === 'tetap' 
                    ? 'bg-emerald-50 text-emerald-600 border border-emerald-200/60' 
                    : 'bg-amber-50 text-amber-600 border border-amber-200/60';

                const dateOptions = { day: '2-digit', month: 'short', year: 'numeric' };
                const formattedDate = tanggal.toLocaleDateString('id-ID', dateOptions);

                const row = `
                    <tr class="hover:bg-slate-50/60 transition-colors group">
                        <td class="py-4 px-6 whitespace-nowrap">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-50 to-indigo-50 border border-slate-200 flex items-center justify-center text-blue-600 font-bold text-sm uppercase shadow-sm group-hover:from-blue-600 group-hover:to-indigo-600 group-hover:text-white group-hover:border-transparent transition-all duration-300">
                                    ${nama.substring(0, 2)}
                                </div>
                                <div>
                                    <div class="font-semibold text-slate-800 group-hover:text-blue-600 transition-colors duration-200">${nama}</div>
                                    <div class="text-[11px] text-slate-400 font-medium tracking-wide">ID: ${emp.id}</div>
                                </div>
                            </div>
                        </td>
                        <td class="py-4 px-6 whitespace-nowrap text-sm text-slate-500 font-mono font-medium">${nik}</td>
                        <td class="py-4 px-6 whitespace-nowrap">
                            <div class="text-sm font-semibold text-slate-700">${jabatan}</div>
                            <div class="text-xs text-slate-400 font-medium mt-0.5">${departemen}</div>
                        </td>
                        <td class="py-4 px-6 whitespace-nowrap text-sm text-slate-500 font-medium">
                            <i class="fa-regular fa-calendar text-slate-400 mr-2"></i>${formattedDate}
                        </td>
                        <td class="py-4 px-6 whitespace-nowrap">
                            <span class="px-2.5 py-1 rounded-lg text-xs font-bold border ${badgeClass} shadow-sm inline-block">
                                ${status}
                            </span>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });

            totalDiv.innerHTML = `Menampilkan <b>${data.length}</b> karyawan`;
        }

        const searchInput = document.getElementById('search-input');
        const btnReset = document.getElementById('btn-reset');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            
            if(query !== '') {
                btnReset.classList.remove('hidden');
                btnReset.classList.add('flex');
            } else {
                btnReset.classList.add('hidden');
            }

            const filtered = allEmployees.filter(emp => {
                const nama = (emp.nama || "").toLowerCase();
                const nik = (emp.nik || "").toLowerCase();
                const jabatan = (emp.jabatan || "").toLowerCase();
                const departemen = (emp.departemen || "").toLowerCase();

                return nama.includes(query) || 
                       nik.includes(query) || 
                       jabatan.includes(query) || 
                       departemen.includes(query);
            });

            renderTable(filtered);
        });

        function clearSearch() {
            searchInput.value = '';
            btnReset.classList.add('hidden');
            renderTable(allEmployees);
        }

        fetchEmployees();
    </script>
</body>
</html>
