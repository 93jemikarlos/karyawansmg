<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Riwayat Karyawan Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); 
        }
        .luxury-card { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.03), 0 4px 12px -2px rgba(0, 0, 0, 0.02);
        }
        .luxury-shadow {
            box-shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.05);
        }
        .blur-content {
            filter: blur(8px);
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 p-3 md:p-8 relative">

    <div id="gatekeeper-overlay" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/10 backdrop-blur-xl transition-all duration-500">
        <div class="bg-white rounded-2xl p-6 md:p-8 max-w-sm w-full border border-slate-200/80 shadow-2xl text-center">
            <div class="w-16 h-16 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-2xl mx-auto mb-4 border border-blue-100 shadow-sm">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h2 class="text-xl font-bold text-slate-900 tracking-tight">Otentikasi Diperlukan</h2>
            <p class="text-xs text-slate-500 mt-1 mb-6 font-medium">Masukkan kode keamanan untuk mengakses HR Portal</p>
            
            <div class="relative mb-4">
                <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input 
                    type="password" 
                    id="gatekeeper-code" 
                    placeholder="Masukkan kode akses..." 
                    class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 pl-11 pr-4 text-center font-mono text-slate-800 tracking-widest focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all"
                    onkeypress="checkEnter(event)"
                >
            </div>
            
            <p id="error-message" class="text-xs font-semibold text-red-500 mb-4 hidden">
                <i class="fa-solid fa-circle-exclamation mr-1"></i> Kode akses salah.
            </p>

            <button onclick="verifyCode()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-semibold py-3 rounded-xl shadow-lg shadow-blue-500/10 transition-all">
                Buka Akses Portal
            </button>
        </div>
    </div>

    <div id="main-portal-content" class="max-w-6xl mx-auto blur-content transition-all duration-700">
        <header class="mb-6 md:mb-10 text-center md:text-left flex flex-col md:flex-row justify-between items-center gap-3">
            <div>
                <h1 class="text-2xl md:text-4xl font-black tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-slate-900 via-indigo-950 to-blue-900">
                    <i class="fa-solid fa-id-card-clip mr-2 text-blue-600"></i>HR Portal
                </h1>
                <p class="text-xs md:text-sm text-slate-500 mt-0.5 font-medium tracking-wide">Manajemen & Pencarian Riwayat Karyawan Eksekutif</p>
            </div>
            <div id="connection-status" class="text-[11px] md:text-xs font-semibold px-3 py-1.5 rounded-full bg-amber-50 text-amber-600 border border-amber-200 shadow-sm flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></span> Connecting to Firebase...
            </div>
        </header>

        <div class="luxury-card rounded-2xl p-4 md:p-5 mb-6 md:mb-8 luxury-shadow">
            <div class="flex flex-col md:flex-row gap-3">
                <div class="relative flex-1">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-base"></i>
                    <input 
                        type="text" 
                        id="search-input"
                        placeholder="Cari Nama, NIK, Jabatan, Departemen..." 
                        class="w-full bg-slate-50 border border-slate-200 rounded-xl py-3 pl-11 pr-4 text-sm md:text-base text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 focus:bg-white transition-all shadow-inner"
                    >
                </div>
                <button onclick="clearSearch()" id="btn-reset" class="hidden bg-slate-100 hover:bg-slate-200 text-slate-600 font-semibold px-5 py-3 rounded-xl text-sm transition-all items-center justify-center border border-slate-200">
                    Reset
                </button>
            </div>
        </div>

        <div class="luxury-card rounded-2xl overflow-hidden luxury-shadow">
            
            <div class="hidden md:block overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50/70 border-b border-slate-100 text-slate-500 text-xs font-bold uppercase tracking-wider">
                            <th class="py-4 px-6">Karyawan</th>
                            <th class="py-4 px-6">NIK</th>
                            <th class="py-4 px-6">Posisi & Dep</th>
                            <th class="py-4 px-6">Tanggal Masuk</th>
                            <th class="py-4 px-6">Status</th>
                        </tr>
                    </thead>
                    <tbody id="employee-table-body" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>

            <div id="employee-cards-body" class="block md:hidden p-3 space-y-3">
                </div>
            
            <div class="bg-slate-50/50 px-5 py-4 border-t border-slate-100 text-xs font-medium text-slate-500 flex justify-between items-center">
                <div id="total-employees">Menghitung karyawan...</div>
                <div class="tracking-wider uppercase text-[9px] text-slate-400 font-bold">Sistem HR v2.1</div>
            </div>
        </div>
    </div>

    <script>
        const firebaseURL = "https://karyawan-3a1e8-default-rtdb.firebaseio.com/riwayat_karyawan.json"; 
        let allEmployees = [];

        // --- SISTEM LOGIN / GATEKEEPER ---
        function verifyCode() {
            const inputCode = document.getElementById('gatekeeper-code').value;
            const correctCode = "smg99";
            const overlay = document.getElementById('gatekeeper-overlay');
            const mainContent = document.getElementById('main-portal-content');
            const errorMsg = document.getElementById('error-message');

            if(inputCode === correctCode) {
                overlay.classList.add('opacity-0', 'invisible', 'scale-95');
                mainContent.classList.remove('blur-content');
                fetchEmployees();
            } else {
                errorMsg.classList.remove('hidden');
                document.getElementById('gatekeeper-code').value = '';
                document.getElementById('gatekeeper-code').focus();
            }
        }

        function checkEnter(event) {
            if (event.key === "Enter") { verifyCode(); }
        }

        // --- AMBIL DATA FIREBASE ---
        async function fetchEmployees() {
            try {
                const response = await fetch(firebaseURL);
                const data = await response.json();
                
                if(data) {
                    allEmployees = Object.keys(data).map(key => ({
                        id: key,
                        ...data[key]
                    }));
                    
                    const statusDiv = document.getElementById('connection-status');
                    statusDiv.className = "text-[11px] md:text-xs font-semibold px-3 py-1.5 rounded-full bg-emerald-50 text-emerald-600 border border-emerald-200 shadow-sm flex items-center gap-2";
                    statusDiv.innerHTML = `<span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Firebase Live Connected`;
                    
                    renderLayout(allEmployees);
                } else {
                    showEmptyState();
                }
            } catch (error) {
                console.error("Gagal memuat data:", error);
                const errorHTML = `
                    <div class="py-12 text-center text-red-500 font-medium text-sm">
                        <i class="fa-solid fa-triangle-exclamation text-2xl mb-2 block"></i>
                        Gagal terhubung ke Firebase. Periksa konfigurasi Rules database.
                    </div>
                `;
                document.getElementById('employee-table-body').innerHTML = `<tr><td colspan="5">${errorHTML}</td></tr>`;
                document.getElementById('employee-cards-body').innerHTML = errorHTML;
            }
        }

        function showEmptyState() {
            const emptyHTML = `
                <div class="py-12 text-center text-slate-400 font-medium text-sm">
                    <i class="fa-regular fa-folder-open text-3xl mb-2 block text-slate-300"></i>
                    Tidak ada data riwayat karyawan ditemukan.
                </div>
            `;
            document.getElementById('employee-table-body').innerHTML = `<tr><td colspan="5">${emptyHTML}</td></tr>`;
            document.getElementById('employee-cards-body').innerHTML = emptyHTML;
            document.getElementById('total-employees').innerHTML = `Menampilkan <b>0</b> karyawan`;
        }

        // --- RENDER DUA DISPLAY UTAMA ---
        function renderLayout(data) {
            const tableBody = document.getElementById('employee-table-body');
            const cardsBody = document.getElementById('employee-cards-body');
            const totalDiv = document.getElementById('total-employees');
            
            tableBody.innerHTML = '';
            cardsBody.innerHTML = '';

            if(data.length === 0) {
                showEmptyState();
                return;
            }

            data.forEach(emp => {
                const nama = emp.nama || "Tanpa Nama";
                const nik = emp.nik || "-";
                const jabatan = emp.jabatan || "-";
                const departemen = emp.departemen || "-";
                const status = emp.status || "Kontrak";
                const tanggal = emp.tanggal_masuk ? new Date(emp.tanggal_masuk) : new Date();

                const dateOptions = { day: '2-digit', month: 'short', year: 'numeric' };
                const formattedDate = tanggal.toLocaleDateString('id-ID', dateOptions);

                const isTetap = status.toLowerCase() === 'tetap';
                const badgeColor = isTetap 
                    ? 'bg-emerald-50 text-emerald-600 border-emerald-200/60' 
                    : 'bg-amber-50 text-amber-600 border-amber-200/60';

                // 1. GENERATE FORMAT TABEL (DESKTOP)
                const rowHTML = `
                    <tr class="hover:bg-slate-50/60 transition-colors group">
                        <td class="py-4 px-6 whitespace-nowrap">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-50 to-indigo-50 border border-slate-200 flex items-center justify-center text-blue-600 font-bold text-sm uppercase shadow-sm group-hover:from-blue-600 group-hover:to-indigo-600 group-hover:text-white group-hover:border-transparent transition-all duration-300">
                                    ${nama.substring(0, 2)}
                                </div>
                                <div>
                                    <div class="font-semibold text-slate-800 group-hover:text-blue-600 transition-colors duration-200">${nama}</div>
                                    <div class="text-[11px] text-slate-400 font-medium tracking-wide">ID: ${emp.id}</div>
                                </div>
                            </div>
                        </td>
                        <td class="py-4 px-6 whitespace-nowrap text-sm text-slate-500 font-mono font-medium">${nik}</td>
                        <td class="py-4 px-6 whitespace-nowrap">
                            <div class="text-sm font-semibold text-slate-700">${jabatan}</div>
                            <div class="text-xs text-slate-400 font-medium mt-0.5">${departemen}</div>
                        </td>
                        <td class="py-4 px-6 whitespace-nowrap text-sm text-slate-500 font-medium">
                            <i class="fa-regular fa-calendar text-slate-400 mr-2"></i>${formattedDate}
                        </td>
                        <td class="py-4 px-6 whitespace-nowrap">
                            <span class="px-2.5 py-1 rounded-lg text-xs font-bold border ${badgeColor} shadow-sm inline-block">
                                ${status}
                            </span>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += rowHTML;

                // 2. GENERATE FORMAT KARTU VERTIKAL (HP - TIDAK ADA SCROLL SAMPING)
                const cardHTML = `
                    <div class="bg-white border border-slate-100 rounded-xl p-4 shadow-sm space-y-3">
                        <div class="flex items-center justify-between border-b border-slate-50 pb-2">
                            <div class="flex items-center gap-2.5">
                                <div class="w-9 h-9 rounded-lg bg-blue-50 text-blue-600 font-bold text-xs uppercase flex items-center justify-center border border-slate-100">
                                    ${nama.substring(0, 2)}
                                </div>
                                <div>
                                    <h4 class="font-bold text-slate-800 text-sm">${nama}</h4>
                                    <p class="text-[10px] text-slate-400 font-mono">ID: ${emp.id}</p>
                                </div>
                            </div>
                            <span class="px-2 py-0.5 rounded-md text-[10px] font-bold border ${badgeColor}">
                                ${status}
                            </span>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-y-2 gap-x-1 text-xs">
                            <div>
                                <span class="text-[10px] text-slate-400 block font-medium">NIK</span>
                                <span class="font-mono text-slate-700 font-semibold">${nik}</span>
                            </div>
                            <div>
                                <span class="text-[10px] text-slate-400 block font-medium">Tanggal Masuk</span>
                                <span class="text-slate-600 font-medium"><i class="fa-regular fa-calendar text-slate-400 mr-1"></i>${formattedDate}</span>
                            </div>
                            <div class="col-span-2">
                                <span class="text-[10px] text-slate-400 block font-medium">Jabatan & Departemen</span>
                                <span class="text-slate-800 font-semibold">${jabatan}</span>
                                <span class="text-indigo-600 font-medium bg-indigo-50/50 px-1.5 py-0.5 rounded text-[10px] inline-block ml-1">${departemen}</span>
                            </div>
                        </div>
                    </div>
                `;
                cardsBody.innerHTML += cardHTML;
            });

            totalDiv.innerHTML = `Menampilkan <b>${data.length}</b> karyawan`;
        }

        // --- ENGINE PENCARIAN REALTIME ---
        const searchInput = document.getElementById('search-input');
        const btnReset = document.getElementById('btn-reset');

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            
            if(query !== '') {
                btnReset.classList.remove('hidden');
                btnReset.classList.add('flex');
            } else {
                btnReset.classList.add('hidden');
            }

            const filtered = allEmployees.filter(emp => {
                const nama = (emp.nama || "").toLowerCase();
                const nik = (emp.nik || "").toLowerCase();
                const jabatan = (emp.jabatan || "").toLowerCase();
                const departemen = (emp.departemen || "").toLowerCase();

                return nama.includes(query) || 
                       nik.includes(query) || 
                       jabatan.includes(query) || 
                       departemen.includes(query);
            });

            renderLayout(filtered);
        });

        function clearSearch() {
            searchInput.value = '';
            btnReset.classList.add('hidden');
            renderLayout(allEmployees);
        }
    </script>
</body>
</html>
